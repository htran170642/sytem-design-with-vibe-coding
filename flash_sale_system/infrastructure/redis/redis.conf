# ============================================================
# Redis configuration for flash-sale system
# ============================================================

# ------------------------------------------------------------
# AOF Persistence
# ------------------------------------------------------------

# Enable AOF — every write command is appended to appendonly.aof
appendonly yes

# appendfsync controls when the OS flushes the AOF buffer to disk:
#   always   — flush on every write  → safest, slowest (~1-2k writes/s)
#   everysec — flush once per second → lose at most 1s of data (default)
#   no       — let the OS decide    → fastest, least safe
#
# For flash sale: everysec is the right tradeoff.
# At 100k RPS losing 1s of data on a hard crash is acceptable;
# the worker's PEL ensures in-flight orders are redelivered.
appendfsync everysec

# Disable fsync during AOF rewrite to avoid latency spikes under load.
# The rewrite uses a separate buffer; main AOF still flushes every second.
no-appendfsync-on-rewrite yes

# Trigger AOF rewrite when file grows 100% beyond the last rewrite size
auto-aof-rewrite-percentage 100

# Minimum AOF file size before auto-rewrite kicks in
auto-aof-rewrite-min-size 64mb

# Recover gracefully if AOF file is truncated (e.g. crash mid-write)
aof-use-rdb-preamble yes

# ------------------------------------------------------------
# RDB Persistence (kept as a backup safety net)
# ------------------------------------------------------------

# Save snapshot if at least 1 key changed in 3600s (hourly backstop)
save 3600 1
# Save if at least 100 keys changed in 300s
save 300 100
# Save if at least 10000 keys changed in 60s
save 60 10000

# ------------------------------------------------------------
# Memory
# ------------------------------------------------------------

# Cap Redis memory — prevents OOM on the host.
# Adjust to ~60% of available RAM in production.
maxmemory 512mb

# When maxmemory is hit, evict keys with a TTL first (safest for our use case).
# idempotency keys have TTL; stock keys do not — so stock is never evicted.
maxmemory-policy volatile-lru

# ------------------------------------------------------------
# Performance
# ------------------------------------------------------------

# Disable slow commands that could block the event loop
# rename-command FLUSHALL ""
# rename-command FLUSHDB  ""
# rename-command DEBUG    ""

# TCP keepalive — detect dead clients
tcp-keepalive 60

# Maximum connected clients
maxclients 10000
