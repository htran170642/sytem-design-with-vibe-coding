# Redis replication setup for flash-sale system.
#
# Topology:
#   redis-primary  — accepts reads and writes, AOF enabled
#   redis-replica  — read-only replica, streams replication from primary
#
# Usage:
#   docker-compose -f infrastructure/docker-compose.redis.yml up -d
#   docker-compose -f infrastructure/docker-compose.redis.yml down -v

services:

  redis-primary:
    image: redis:7-alpine
    container_name: flash_sale_redis_primary
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
      --aof-use-rdb-preamble yes
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --tcp-keepalive 60
      --maxclients 10000
    ports:
      - "6379:6379"
    volumes:
      - redis_primary_data:/data
    networks:
      - redis_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-replica:
    image: redis:7-alpine
    container_name: flash_sale_redis_replica
    command: >
      redis-server
      --replicaof redis-primary 6379
      --replica-read-only yes
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
    ports:
      - "6380:6379"
    volumes:
      - redis_replica_data:/data
    networks:
      - redis_net
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_primary_data:
  redis_replica_data:

networks:
  redis_net:
    driver: bridge
