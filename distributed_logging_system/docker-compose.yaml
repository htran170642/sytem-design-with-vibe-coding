version: '3.8'

services:
  #############################################################################
  # Kafka (Redpanda) - Message Broker (Phase 3)
  #############################################################################
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.3
    container_name: observability-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=info
    ports:
      - "18081:18081"  # Schema Registry
      - "18082:18082"  # Pandaproxy
      - "19092:19092"  # Kafka API
      - "19644:9644"   # Admin API
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  #############################################################################
  # OpenSearch - Log Storage (Phase 5)
  #############################################################################
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: observability-opensearch
    environment:
      - cluster.name=observability-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true  # Disable for development
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"   # REST API
      - "9600:9600"   # Performance Analyzer
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  #############################################################################
  # OpenSearch Dashboards - UI for OpenSearch (Optional)
  #############################################################################
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: observability-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    networks:
      - observability
    depends_on:
      opensearch:
        condition: service_healthy

networks:
  observability:
    driver: bridge

volumes:
  opensearch-data:
    driver: local